<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karia Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <circle cx="40" cy="40" r="40" fill="#fff"/>
          <circle cx="28" cy="20" r="5" fill="#43D1C9"/>
          <circle cx="52" cy="20" r="5" fill="#43D1C9"/>
          <path d="M20 28 Q40 44 60 28" stroke="#43D1C9" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          <text x="14" y="60" font-family="Baloo 2, sans-serif" font-size="24" font-weight="600" fill="#081C54">kar</text>
          <text x="50" y="60" font-family="Baloo 2, sans-serif" font-size="24" font-weight="600" fill="#43D1C9">ia</text>
        </svg>
      </div>
      <h2 class="login-title"><span class="login-title-white">Karia</span> <span class="login-title-accent">Agent</span></h2>
      <form class="login-form" id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" autocomplete="email" required />
        <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password" required />
        <div class="login-error" id="loginError"></div>
        <button type="submit" class="login-btn" id="loginBtn">Iniciar sesion</button>
      </form>
    </div>
  </div>

  <!-- CHAT (hidden until login) -->
  <div class="chat-container" id="chatContainer" style="display:none">
    <header class="chat-header">
      <div class="header-left">
        <div class="header-avatar">
          <svg viewBox="0 0 40 40" width="40" height="40">
            <circle cx="20" cy="20" r="20" fill="#fff"/>
            <circle cx="14" cy="10" r="2.5" fill="#43D1C9"/>
            <circle cx="26" cy="10" r="2.5" fill="#43D1C9"/>
            <path d="M10 14 Q20 22 30 14" stroke="#43D1C9" stroke-width="2" fill="none" stroke-linecap="round"/>
            <text x="7" y="30" font-family="Baloo 2, sans-serif" font-size="13" font-weight="600" fill="#081C54">kar</text>
            <text x="25" y="30" font-family="Baloo 2, sans-serif" font-size="13" font-weight="600" fill="#43D1C9">ia</text>
          </svg>
        </div>
        <div class="header-info">
          <h1><span class="header-name-white">Karia</span> <span class="header-name-accent">Agent</span></h1>
          <span class="header-subtitle" id="headerSubtitle">Agente inteligente · En linea</span>
        </div>
      </div>
      <div class="header-right">
        <span class="header-user-name" id="headerUserName"></span>
        <button class="btn-logout" id="logoutBtn" title="Cerrar sesion">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="chat-messages" id="messages">
      <!-- Welcome message injected by app.js -->
    </div>

    <div class="chat-input-area">
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" />
      <form class="chat-input" id="chatForm">
        <button type="button" class="btn-attach" id="attachBtn" title="Adjuntar archivo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <div class="input-wrapper">
          <div id="fileLabel" class="file-label" style="display:none">
            <span class="file-label-icon">📄</span>
            <span class="file-label-name"></span>
            <button type="button" class="file-label-remove" id="fileRemoveBtn">&times;</button>
          </div>
          <textarea
            id="userInput"
            placeholder="Escribi tu mensaje..."
            autocomplete="off"
            rows="1"
          ></textarea>
        </div>
        <button type="submit" class="btn-send" id="sendBtn" title="Enviar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </form>
      <div class="chat-footer">Karia Agent · Potenciado por KarIA</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
