<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karia Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="chat-container" id="chatContainer">
    <header class="chat-header">
      <div class="header-left">
        <div class="header-avatar">
          <svg viewBox="0 0 40 40" width="40" height="40">
            <circle cx="20" cy="20" r="20" fill="#fff"/>
            <circle cx="14" cy="10" r="2.5" fill="#43D1C9"/>
            <circle cx="26" cy="10" r="2.5" fill="#43D1C9"/>
            <path d="M10 14 Q20 22 30 14" stroke="#43D1C9" stroke-width="2" fill="none" stroke-linecap="round"/>
            <text x="7" y="30" font-family="Baloo 2, sans-serif" font-size="13" font-weight="600" fill="#081C54">kar</text>
            <text x="25" y="30" font-family="Baloo 2, sans-serif" font-size="13" font-weight="600" fill="#43D1C9">ia</text>
          </svg>
        </div>
        <div class="header-info">
          <h1><span class="header-name-white">Karia</span> <span class="header-name-accent">Agent</span></h1>
          <span class="header-subtitle">Agente inteligente · En linea</span>
        </div>
      </div>
    </header>

    <div class="drop-overlay" id="dropOverlay">
      <div class="drop-overlay-content">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#43D1C9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Solta el archivo aca</span>
      </div>
    </div>

    <div class="chat-messages" id="messages">
      <!-- Welcome message injected by app.js -->
    </div>

    <div class="chat-input-area">
      <input type="file" id="fileInput" accept=".xlsx,.xls,.doc,.docx" style="display:none" />
      <form class="chat-input" id="chatForm">
        <button type="button" class="btn-reset" id="resetBtn" title="Nueva conversacion">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
        </button>
        <button type="button" class="btn-attach" id="attachBtn" title="Adjuntar archivo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <div class="input-wrapper">
          <div id="fileLabel" class="file-label" style="display:none">
            <span class="file-label-icon">📄</span>
            <span class="file-label-name"></span>
            <button type="button" class="file-label-remove" id="fileRemoveBtn">&times;</button>
          </div>
          <textarea
            id="userInput"
            placeholder="Escribi tu mensaje..."
            autocomplete="off"
            rows="1"
          ></textarea>
        </div>
        <button type="submit" class="btn-send" id="sendBtn" title="Enviar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </form>
      <div class="chat-footer">Karia Agent · Potenciado por KarIA</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
